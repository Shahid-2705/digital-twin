# WSL2 NVIDIA GPU Setup Prerequisites:
# 1. Update WSL2 to the latest version:
#    wsl --update
# 2. Ensure your Windows NVIDIA drivers are up to date (these include WSL2 support out of the box).
# 3. Ensure Docker Desktop is using the WSL2 backend (Settings > General > Use the WSL 2 based engine).
# 4. If running Docker Engine natively inside a WSL2 Ubuntu distro (without Docker Desktop), you must install the NVIDIA Container Toolkit:
#    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
#    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
#      sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
#      sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#    sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#    sudo nvidia-ctk runtime configure --runtime=docker
#    sudo systemctl restart docker

version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - "./data/qdrant:/qdrant/storage"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - "ollama-data:/root/.ollama"
    environment:
      - OLLAMA_GPU_LAYERS=35
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ollama-data:
